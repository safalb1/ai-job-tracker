name: Fetch jobs snapshot

# Keeps data/jobs.json fresh so the site always has data (and India/on-site
# jobs from Adzuna). Live sources are also fetched directly in the browser,
# so the site is real-time on load — this is the always-available fallback.

on:
  schedule:
    # Every 3 hours. The browser fetches live jobs on every page load anyway,
    # so this snapshot is just the always-available fallback. 3h keeps Adzuna
    # (6 countries x 4 terms = 24 calls/run = ~192/day) under its free limit.
    - cron: "0 */3 * * *"
  workflow_dispatch: {}        # lets you trigger a refresh manually from the Actions tab
  push:
    branches: [ main ]
    paths:
      - "scripts/fetch_jobs.py"
      - ".github/workflows/fetch-jobs.yml"

permissions:
  contents: write

concurrency:
  group: fetch-jobs
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch jobs
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_KEY: ${{ secrets.JOOBLE_KEY }}
        run: python scripts/fetch_jobs.py

      - name: Commit snapshot if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/jobs.json
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "chore: refresh jobs snapshot [skip ci]"
            git push
          fi
